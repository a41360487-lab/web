<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Securolpicxews - Game Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 50%,#252538 100%);color:#fff;min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#e11d2d 0%,#c41e2a 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:rgba(255,255,255,0.3);box-shadow:0 4px 15px rgba(225,29,45,0.3)}
.logo-text{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff 0%,#e0e0e0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btns{display:flex;gap:10px}
.nav-btn{background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.1);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.2s ease}
.nav-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.nav-btn.primary{background:linear-gradient(135deg,#4ade80 0%,#22d3ee 100%);color:#1a1a2e;border:none;font-weight:600}
.main-layout{display:flex;max-width:1600px;margin:0 auto;padding:24px;gap:24px}
.sidebar{width:280px;flex-shrink:0}
.panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;margin-bottom:16px}
.panel-title{font-size:14px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.auth-tabs{display:flex;gap:6px;margin-bottom:16px}
.auth-tab{flex:1;padding:10px;border:none;border-radius:8px;background:rgba(255,255,255,0.06);color:#aaa;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s ease}
.auth-tab:hover{background:rgba(255,255,255,0.1)}
.auth-tab.active{background:linear-gradient(135deg,#4ade80 0%,#22d3ee 100%);color:#1a1a2e}
.auth-form{display:none}
.auth-form.active{display:block}
.auth-input{width:100%;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.05);color:#fff;font-size:14px;transition:all 0.2s ease}
.auth-input::placeholder{color:rgba(255,255,255,0.4)}
.auth-input:focus{outline:none;border-color:#4ade80;background:rgba(255,255,255,0.08)}
.btn-submit{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#4ade80 0%,#22d3ee 100%);color:#1a1a2e;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s ease}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(74,222,128,0.3)}
.guest-link{text-align:center;margin-top:12px;font-size:13px;color:#888}
.guest-link a{color:#4ade80;text-decoration:none;cursor:pointer}
.guest-link a:hover{text-decoration:underline}
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:16px}
.user-name{font-weight:600;font-size:14px}
.badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#4ade80 0%,#22d3ee 100%);color:#1a1a2e}
.badge.guest{background:rgba(255,255,255,0.15);color:#fff}
.drop-zone{border:2px dashed rgba(255,255,255,0.15);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.3s ease;background:rgba(255,255,255,0.02);margin-bottom:12px}
.drop-zone:hover{border-color:#4ade80;background:rgba(74,222,128,0.05)}
.drop-zone .icon{font-size:36px;display:block;margin-bottom:8px}
.drop-zone p{font-size:13px;color:#aaa;margin:4px 0}
.drop-zone .small{font-size:11px;color:#666}
.upload-options{display:flex;gap:8px;margin-bottom:12px}
.upload-options label{flex:1;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.05);justify-content:center}
.upload-settings label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;margin-bottom:6px;color:#aaa}
.locked-hint{text-align:center;padding:20px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px dashed rgba(255,255,255,0.1)}
.locked-hint .lock-icon{font-size:28px;display:block;margin-bottom:8px}
.locked-hint p{font-size:13px;color:#888}
.content-area{flex:1;min-width:0}
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;padding-right:12px;border-right:3px solid #4ade80}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.game-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}
.game-card:hover{background:rgba(255,255,255,0.08);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.3);border-color:rgba(74,222,128,0.2)}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4ade80,#22d3ee);opacity:0;transition:opacity 0.3s ease}
.game-card:hover::before{opacity:1}
.game-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.game-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.game-card-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card-meta{font-size:12px;color:#888;margin-top:2px}
.game-card-tags{display:flex;gap:6px;margin-top:12px}
.tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500}
.tag.default{background:rgba(74,222,128,0.15);color:#4ade80}
.tag.public{background:rgba(251,191,36,0.15);color:#fbbf24}
.tag.private{background:rgba(255,255,255,0.08);color:#aaa}
.game-card-actions{display:flex;gap:8px;margin-top:12px}
.card-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s ease}
.card-btn.play{background:linear-gradient(135deg,#4ade80 0%,#22d3ee 100%);color:#1a1a2e}
.card-btn.play:hover{opacity:0.9;transform:scale(1.02)}
.card-btn.delete{background:rgba(239,68,68,0.15);color:#f87171}
.card-btn.delete:hover{background:rgba(239,68,68,0.25)}
.game-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:#0a0a1a;display:none;flex-direction:column}
.game-overlay.active{display:flex}
.game-overlay-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:linear-gradient(135deg,#1a1a2e 0%,#252538 100%);border-bottom:1px solid rgba(255,255,255,0.06)}
.game-overlay-title{font-size:16px;font-weight:600}
.game-overlay-btns{display:flex;gap:8px}
.overlay-btn{padding:8px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.06);color:#ccc;cursor:pointer;font-size:13px;transition:all 0.2s ease}
.overlay-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.overlay-btn.danger{background:rgba(239,68,68,0.2);color:#f87171;border-color:rgba(239,68,68,0.3)}
.overlay-btn.danger:hover{background:rgba(239,68,68,0.3)}
.game-canvas-area{flex:1;position:relative;background:#050510;overflow:hidden}
.game-canvas-area canvas{display:block;width:100%;height:100%}
.game-status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px;background:#151525;border-top:1px solid rgba(255,255,255,0.05);font-size:12px;color:#666}
.loading-screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;z-index:10}
.loading-screen.hidden{display:none}
.spinner{width:50px;height:50px;border:3px solid rgba(74,222,128,0.2);border-top-color:#4ade80;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.notification{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:2000;animation:slideUp 0.3s ease;direction:rtl}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.25)}
@media(max-width:900px){.main-layout{flex-direction:column}.sidebar{width:100%}.games-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
<div class="logo">
<div class="logo-icon">S</div>
<span class="logo-text">Securolpicxews</span>
</div>
<div class="nav-btns">
<button class="nav-btn" onclick="app.toggleFullscreen()">⛶ تمام صفحه</button>
</div>
</header>
<div class="main-layout">
<aside class="sidebar" id="sidebar">
<div class="panel" id="authPanel">
<div class="panel-title">🔐 حساب کاربری</div>
<div class="auth-tabs">
<button class="auth-tab active" onclick="app.switchAuthTab('login',this)">ورود</button>
<button class="auth-tab" onclick="app.switchAuthTab('register',this)">ثبت نام</button>
</div>
<div class="auth-form active" id="loginForm">
<input type="text" class="auth-input" id="loginUsername" placeholder="نام کاربری">
<input type="password" class="auth-input" id="loginPassword" placeholder="رمز عبور">
<button class="btn-submit" onclick="app.login()">ورود</button>
<div class="guest-link">
یا <a onclick="app.guestLogin()">ورود به عنوان مهمان</a>
</div>
</div>
<div class="auth-form" id="registerForm">
<input type="text" class="auth-input" id="regUsername" placeholder="نام کاربری">
<input type="email" class="auth-input" id="regEmail" placeholder="ایمیل">
<input type="password" class="auth-input" id="regPassword" placeholder="رمز عبور">
<input type="password" class="auth-input" id="regPasswordConfirm" placeholder="تکرار رمز عبور">
<button class="btn-submit" onclick="app.register()">ثبت نام</button>
</div>
</div>
<div class="panel" id="userPanel" style="display:none">
<div class="user-bar">
<span class="user-name" id="userDisplayName">👤 کاربر</span>
<span class="badge" id="userBadge">عضو</span>
</div>
<button class="btn-submit" onclick="app.logout()" style="background:rgba(239,68,68,0.2);color:#f87171">🚪 خروج</button>
</div>
<div class="panel" id="uploadPanel" style="display:none">
<div class="panel-title">📤 آپلود بازی</div>
<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
<span class="icon">📁</span>
<p>فایل را اینجا بکشید یا کلیک کنید</p>
<p class="small">HTML یا ZIP</p>
<input type="file" id="fileInput" accept=".html,.zip" style="display:none" onchange="app.handleFiles(this.files)">
</div>
<div class="upload-options">
<label><input type="radio" name="uploadType" value="html" checked onchange="app.uploadType='html'"> HTML</label>
<label><input type="radio" name="uploadType" value="zip" onchange="app.uploadType='zip'"> ZIP</label>
</div>
<div class="upload-settings">
<label><input type="checkbox" id="publicUpload" checked> 🌐 عمومی</label>
<label><input type="checkbox" id="privateUpload"> 🔒 خصوصی</label>
</div>
<button class="btn-submit" onclick="document.getElementById('fileInput').click()">📤 آپلود بازی</button>
</div>
<div class="panel" id="lockedPanel" style="display:none">
<div class="panel-title">📤 آپلود بازی</div>
<div class="locked-hint">
<span class="lock-icon">🔒</span>
<p>برای آپلود بازی ثبت نام کنید</p>
</div>
</div>
</aside>
<main class="content-area">
<div class="section-title">🎮 بازی‌های پیش‌فرض</div>
<div class="games-grid" id="defaultGames"></div>
<div class="section-title">📂 بازی‌های من</div>
<div class="games-grid" id="myGames"></div>
<div class="section-title">🌍 بازی‌های عمومی</div>
<div class="games-grid" id="publicGames"></div>
</main>
</div>
<div class="game-overlay" id="gameOverlay">
<div class="game-overlay-header">
<span class="game-overlay-title" id="overlayTitle">🎮 بازی</span>
<div class="game-overlay-btns">
<button class="overlay-btn" onclick="app.refreshGame()">🔄 رفرش</button>
<button class="overlay-btn" onclick="app.toggleFullscreen()">⛶ تمام صفحه</button>
<button class="overlay-btn danger" onclick="app.closeGame()">✕ بستن</button>
</div>
</div>
<div class="game-canvas-area" id="gameCanvasArea">
<div class="loading-screen" id="gameLoading">
<div class="spinner"></div>
<div style="color:#888;font-size:14px">در حال بارگذاری بازی...</div>
</div>
</div>
<div class="game-status-bar">
<span><span style="color:#4ade80">●</span> <span id="overlayStatus">Ready</span></span>
<span>Securolpicxews Game Engine</span>
</div>
</div>
<script>
// بازی Open-3D-ReMaKe² - یک بازی سه‌بعدی جنگی با موتور Three.js
const OPEN_3D_GAME = `<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Open3D: نبرد نهایی - جنگجوی موبایل</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Tahoma', 'Segoe UI', sans-serif; background-color: #000; touch-action: none; }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .menu-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            color: white;
            pointer-events: auto;
            border: 2px solid #ffaa00;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffaa00; margin-bottom: 10px; text-shadow: 0 0 5px #ff6600; }
        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 40px;
            border: none;
            margin: 15px 0;
            width: 220px;
            text-align: center;
            background: #222;
            color: white;
            font-weight: bold;
        }
        button {
            padding: 12px 30px;
            font-size: 20px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.96); }
        #game-ui {
            position: absolute;
            top: 10px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 15;
            font-size: 14px;
        }
        #boss-warning {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            color: #ff3300;
            font-size: 28px;
            font-weight: bold;
            display: none;
            animation: blink 0.8s infinite;
            text-shadow: 0 0 10px red;
            z-index: 25;
            pointer-events: none;
        }
        @keyframes blink { 50% { opacity: 0; } }
        #controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 8px;
            border-radius: 12px;
            direction: ltr;
            z-index: 20;
            pointer-events: none;
        }
        #status-bar {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ff8888;
            font-size: 18px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 30px;
            display: none;
            z-index: 20;
            white-space: nowrap;
        }
        #wave-info {
            position: absolute;
            top: 110px;
            width: 100%;
            text-align: center;
            color: #ffff88;
            font-size: 18px;
            font-weight: bold;
            display: none;
            text-shadow: 1px 1px 0 black;
            z-index: 20;
            pointer-events: none;
        }
        #victory-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: gold;
            font-size: 32px;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .joystick-container {
            position: absolute;
            bottom: 80px;
            left: 30px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(30,30,40,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 30;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background: rgba(0,0,0,0.4);
        }
        .joystick-thumb {
            width: 55px;
            height: 55px;
            background: #ffaa33;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 2px solid white;
            transition: transform 0.02s;
            cursor: pointer;
        }
        .shoot-btn {
            position: absolute;
            bottom: 90px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4444, #aa0000);
            border: 3px solid #ffaa66;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px black;
            z-index: 30;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .shoot-btn:active { transform: scale(0.94); background: radial-gradient(circle at 30% 30%, #ff6666, #cc0000); }
        .camera-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
            z-index: 20;
        }
        @media (max-width: 700px) {
            .joystick-container { width: 110px; height: 110px; bottom: 70px; left: 20px; }
            .joystick-thumb { width: 45px; height: 45px; }
            .shoot-btn { width: 70px; height: 70px; bottom: 80px; right: 20px; font-size: 24px; }
            #game-ui { font-size: 12px; }
        }
        #p-hp { color: #ffaa66; font-weight: bold; }
        #e-units { color: #ff6666; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
</head>
<body>
    <div id="ui-layer">
        <div class="menu-box" id="start-menu">
            <h1>🔥 Open3D: نبرد نهایی 🔥</h1>
            <p>نام کشور خود را وارد کنید:</p>
            <input type="text" id="player-name-input" placeholder="مثلا: ایران" value="ایران">
            <br>
            <button onclick="startGame()">شلیک کن! 🚀</button>
            <p style="font-size:12px; margin-top:15px;">🎮 حرکت: جوی استیک چپ | 🔫 شلیک: دکمه قرمز</p>
        </div>
    </div>
    <div id="game-ui">
        <div id="player-info">🛡️ <span id="p-name"></span> | ❤️ <span id="p-hp">100</span></div>
        <div id="enemy-info">👾 <span id="e-name"></span> | تعداد: <span id="e-units">0</span></div>
    </div>
    <div id="boss-warning">⚠️ هشدار! فرمانده دشمن ⚠️</div>
    <div id="wave-info"></div>
    <div id="status-bar">💥 برخورد: <span id="hits-count">0</span> / 3</div>
    <div id="controls-hint">⌨️ WASD + فلش | 📱 جوی استیک چپ | 🔴 شلیک: دکمه قرمز</div>
    <div class="camera-hint">🎥 دوربین: دو انگشت بکشید (اختیاری)</div>
    <div id="joyContainer" class="joystick-container" style="display: none;">
        <div class="joystick-base">
            <div id="joyThumb" class="joystick-thumb"></div>
        </div>
    </div>
    <div id="shootButton" class="shoot-btn" style="display: none;">🔫</div>
    <div id="victory-screen">
        <h1>🏆 پیروزی بزرگ! 🏆</h1>
        <p>ربات نهایی منهدم شد!</p>
        <button onclick="location.reload()">بازی دوباره</button>
    </div>
    <script>
        let scene, camera, renderer;
        let player, ground;
        let playerSpeed = 0.32;
        let cameraSpeed = 0.04;
        let isGameActive = false;
        let playerName = "";
        let enemyName = "";
        let enemyUnits = [];
        let bullets = []; 
        let bossEnemy = null;
        let hitsTaken = 0;
        const maxHits = 3;
        let playerHealth = 100;
        let wave = 1;
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let cameraAngle = 0; 
        let cameraHeight = 18;
        let cameraDistance = 28;
        let joyActive = false;
        let joyX = 0, joyY = 0;
        let moveDirection = { x: 0, z: 0 };
        const botNames = ["امپراتوری سایه", "اتحاد سرخ", "شورای آهنین", "لژیون جهنمی"];
        let spawnInterval = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x071A3B);
            scene.fog = new THREE.FogExp2(0x071A3B, 0.008);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
            dirLight.position.set(30, 45, 20);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x4466cc, 0.4);
            backLight.position.set(-10, 20, -20);
            scene.add(backLight);
            const groundGeo = new THREE.PlaneGeometry(220, 220);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2c5e2e, roughness: 0.8, metalness: 0.1 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            const gridHelper = new THREE.GridHelper(200, 30, 0x88aa88, 0x446644);
            gridHelper.position.y = 0.02;
            scene.add(gridHelper);
            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'w' || key === 'W') keys.w = true;
                if (key === 'a' || key === 'A') keys.a = true;
                if (key === 's' || key === 'S') keys.s = true;
                if (key === 'd' || key === 'D') keys.d = true;
                if (key === 'ArrowUp') keys.ArrowUp = true;
                if (key === 'ArrowDown') keys.ArrowDown = true;
                if (key === 'ArrowLeft') keys.ArrowLeft = true;
                if (key === 'ArrowRight') keys.ArrowRight = true;
                if (key === '1' || key === ' ') { e.preventDefault(); shootBullet(); }
            });
            document.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'w' || key === 'W') keys.w = false;
                if (key === 'a' || key === 'A') keys.a = false;
                if (key === 's' || key === 'S') keys.s = false;
                if (key === 'd' || key === 'D') keys.d = false;
                if (key === 'ArrowUp') keys.ArrowUp = false;
                if (key === 'ArrowDown') keys.ArrowDown = false;
                if (key === 'ArrowLeft') keys.ArrowLeft = false;
                if (key === 'ArrowRight') keys.ArrowRight = false;
            });
            setupJoystick();
            setupShootButton();
            animate();
        }

        function setupJoystick() {
            const container = document.getElementById('joyContainer');
            const thumb = document.getElementById('joyThumb');
            let active = false;
            const handleMove = (clientX, clientY) => {
                if (!active) return;
                const rect = container.getBoundingClientRect();
                const baseX = rect.left + rect.width/2;
                const baseY = rect.top + rect.height/2;
                let dx = clientX - baseX;
                let dy = clientY - baseY;
                const maxDist = rect.width/2 - 10;
                let dist = Math.hypot(dx, dy);
                if (dist > maxDist) {
                    dx = dx / dist * maxDist;
                    dy = dy / dist * maxDist;
                    dist = maxDist;
                }
                thumb.style.transform = \`translate(calc(-50% + \${dx}px), calc(-50% + \${dy}px))\`;
                let normX = dx / maxDist;
                let normY = dy / maxDist;
                joyX = normX;
                joyY = normY;
                moveDirection.x = joyX;
                moveDirection.z = joyY;
            };
            const startTouch = (e) => {
                e.preventDefault();
                active = true;
                const touch = e.touches[0];
                handleMove(touch.clientX, touch.clientY);
            };
            const onMove = (e) => {
                if (!active) return;
                const touch = e.touches[0];
                handleMove(touch.clientX, touch.clientY);
            };
            const endTouch = () => {
                active = false;
                thumb.style.transform = 'translate(-50%, -50%)';
                joyX = 0; joyY = 0;
                moveDirection.x = 0;
                moveDirection.z = 0;
            };
            container.addEventListener('touchstart', startTouch);
            container.addEventListener('touchmove', onMove);
            container.addEventListener('touchend', endTouch);
            container.addEventListener('touchcancel', endTouch);
        }

        function setupShootButton() {
            const btn = document.getElementById('shootButton');
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); shootBullet(); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); shootBullet(); });
        }

        function startGame() {
            const inputName = document.getElementById('player-name-input').value;
            if (!inputName.trim()) return;
            playerName = inputName;
            enemyName = botNames[Math.floor(Math.random() * botNames.length)];
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('p-name').innerText = playerName;
            document.getElementById('e-name').innerText = enemyName;
            player = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), new THREE.MeshStandardMaterial({ color: 0x3a86ff, emissive: 0x001133, metalness: 0.7 }));
            player.castShadow = true;
            player.position.set(0, 1.1, 0);
            scene.add(player);
            const aura = new THREE.PointLight(0x2288ff, 0.8, 15);
            player.add(aura);
            hitsTaken = 0;
            enemyUnits = [];
            bullets = [];
            bossEnemy = null;
            wave = 1;
            cameraAngle = 0;
            cameraHeight = 18;
            cameraDistance = 28;
            document.getElementById('hits-count').innerText = "0";
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('wave-info').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'none';
            document.getElementById('boss-warning').style.display = 'none';
            document.getElementById('p-hp').innerText = "100";
            playerHealth = 100;
            updateEnemyCount();
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById('joyContainer').style.display = 'flex';
                document.getElementById('shootButton').style.display = 'flex';
            } else {
                document.getElementById('joyContainer').style.display = 'none';
                document.getElementById('shootButton').style.display = 'none';
            }
            startBotSpawner();
            isGameActive = true;
        }

        function startBotSpawner() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if (!isGameActive) { clearInterval(spawnInterval); spawnInterval = null; return; }
                if (bossEnemy) return;
                if (wave === 3 && bossEnemy) return;
                if (wave === 2 && enemyUnits.length > 12) return;
                if (wave === 1 && enemyUnits.length > 8) return;
                const startX = (Math.random() - 0.5) * 100;
                const startZ = (Math.random() - 0.5) * 100;
                if (player && Math.hypot(startX - player.position.x, startZ - player.position.z) > 12) {
                    createEnemyUnit(startX, startZ);
                    updateEnemyCount();
                }
            }, 2200);
        }

        function createEnemyUnit(x, z) {
            let color = 0xE34234;
            let hp = 3;
            let isAdvanced = false;
            if (wave === 2) {
                color = 0xAA6DC9; 
                hp = 45;
                isAdvanced = true;
            } else if (wave === 3) {
                color = 0xFF8C42; 
                hp = 120;
                isAdvanced = true;
            }
            const geometry = new THREE.SphereGeometry(0.95, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: isAdvanced ? 0x331100 : 0x220000 });
            const unit = new THREE.Mesh(geometry, material);
            unit.position.set(x, 1, z);
            unit.castShadow = true;
            unit.userData = { 
                type: 'enemy', 
                hp: hp, 
                speed: isAdvanced ? 0.19 : 0.07, 
                isAdvanced: isAdvanced,
                dodgeTimer: Math.random() * 10
            };
            scene.add(unit);
            enemyUnits.push(unit);
        }

        function shootBullet() {
            if (!isGameActive || !player) return;
            let targetDir = new THREE.Vector3();
            if (bossEnemy) {
                targetDir.subVectors(bossEnemy.position, player.position).normalize();
            } else if (enemyUnits.length > 0) {
                let nearest = null;
                let minDist = Infinity;
                enemyUnits.forEach(unit => {
                    let d = player.position.distanceTo(unit.position);
                    if (d < minDist) { minDist = d; nearest = unit; }
                });
                if (nearest) targetDir.subVectors(nearest.position, player.position).normalize();
                else targetDir.set(0, 0, -1);
            } else {
                targetDir.set(0, 0, -1);
            }
            const geometry = new THREE.SphereGeometry(0.35, 8, 8);
            const material = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
            const bullet = new THREE.Mesh(geometry, material);
            bullet.position.copy(player.position);
            bullet.position.y = 1.2;
            bullet.userData = { velocity: targetDir.clone().multiplyScalar(2.2), life: 90 };
            scene.add(bullet);
            bullets.push(bullet);
        }

        function updateEnemyCount() {
            document.getElementById('e-units').innerText = enemyUnits.length;
        }

        function checkBossCondition() {
            if (enemyUnits.length === 0 && !bossEnemy && isGameActive && wave < 3) {
                triggerBossFight();
            }
            if (wave === 3 && !bossEnemy && enemyUnits.length === 0) {
                document.getElementById('victory-screen').style.display = 'flex';
                isGameActive = false;
                if (spawnInterval) { clearInterval(spawnInterval); spawnInterval = null; }
            }
        }

        function triggerBossFight() {
            document.getElementById('boss-warning').style.display = 'block';
            setTimeout(() => { if(isGameActive) document.getElementById('boss-warning').style.display = 'none'; }, 3000);
            if (wave === 1) {
                const bossGeo = new THREE.BoxGeometry(2.2, 2.8, 2.2);
                const bossMat = new THREE.MeshStandardMaterial({ color: 0x9e2a2a, metalness: 0.7 });
                bossEnemy = new THREE.Mesh(bossGeo, bossMat);
                bossEnemy.position.set(player.position.x + 12, 1.5, player.position.z + 8);
                bossEnemy.userData = { type: 'boss', hp: 45, speed: 0.12, isAdvanced: false };
                scene.add(bossEnemy);
                document.getElementById('e-name').innerHTML = enemyName + " (ژنرال خشمگین)";
            } else if (wave === 2) {
                wave = 3;
                document.getElementById('wave-info').style.display = 'block';
                document.getElementById('wave-info').innerHTML = "🤖 هشدار: ربات نهایی فرا رسید! مقاومت نهایی 🤖";
                document.getElementById('e-name').innerText = "ربات نهایی X-9000";
                const botGeo = new THREE.BoxGeometry(2.4, 4.2, 2.4);
                const botMat = new THREE.MeshStandardMaterial({ color: 0xFF5500, emissive: 0x442200 });
                bossEnemy = new THREE.Mesh(botGeo, botMat);
                bossEnemy.position.set(player.position.x + 18, 2.2, player.position.z + 10);
                bossEnemy.userData = { type: 'boss', hp: 135, speed: 0.26, isAdvanced: true };
                scene.add(bossEnemy);
            }
        }

        function updatePlayerMovement() {
            if (!player) return;
            let moveX = 0, moveZ = 0;
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            if (Math.abs(moveDirection.x) > 0.05 || Math.abs(moveDirection.z) > 0.05) {
                moveX = moveDirection.x;
                moveZ = moveDirection.z;
            }
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                player.position.x += moveX * playerSpeed;
                player.position.z += moveZ * playerSpeed;
            }
            if (keys.ArrowLeft) cameraAngle += cameraSpeed;
            if (keys.ArrowRight) cameraAngle -= cameraSpeed;
            if (keys.ArrowUp) cameraHeight = Math.min(45, cameraHeight + 0.6);
            if (keys.ArrowDown) cameraHeight = Math.max(7, cameraHeight - 0.6);
            player.position.x = Math.min(95, Math.max(-95, player.position.x));
            player.position.z = Math.min(95, Math.max(-95, player.position.z));
            const camX = player.position.x + Math.sin(cameraAngle) * cameraDistance;
            const camZ = player.position.z + Math.cos(cameraAngle) * cameraDistance;
            camera.position.set(camX, cameraHeight, camZ);
            camera.lookAt(player.position);
        }

        function updateBullets() {
            for (let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);
                b.userData.life--;
                let hit = false;
                for (let j=enemyUnits.length-1; j>=0; j--) {
                    const e = enemyUnits[j];
                    if (b.position.distanceTo(e.position) < 1.4) {
                        e.userData.hp -= 8;
                        e.material.emissiveIntensity = 0.5;
                        setTimeout(()=> { if(e) e.material.emissiveIntensity = 0; }, 80);
                        if (e.userData.hp <= 0) {
                            scene.remove(e);
                            enemyUnits.splice(j,1);
                            updateEnemyCount();
                            checkBossCondition();
                        }
                        hit = true;
                        break;
                    }
                }
                if (!hit && bossEnemy && b.position.distanceTo(bossEnemy.position) < 2.2) {
                    bossEnemy.userData.hp -= 7;
                    bossEnemy.material.emissiveIntensity = 0.7;
                    setTimeout(()=> { if(bossEnemy) bossEnemy.material.emissiveIntensity = 0; }, 100);
                    if (bossEnemy.userData.hp <= 0) {
                        scene.remove(bossEnemy);
                        bossEnemy = null;
                        if (wave === 1) {
                            wave = 2;
                            document.getElementById('wave-info').style.display = 'block';
                            document.getElementById('wave-info').innerHTML = "⚔️ موج دوم: دشمنان بنفش (فرار و طفره) ⚔️";
                            enemyUnits = [];
                            updateEnemyCount();
                            if (spawnInterval) { clearInterval(spawnInterval); spawnInterval = null; }
                            startBotSpawner();
                        } else if (wave === 3) {
                            document.getElementById('victory-screen').style.display = 'flex';
                            isGameActive = false;
                            if (spawnInterval) { clearInterval(spawnInterval); spawnInterval = null; }
                            return;
                        }
                    }
                    hit = true;
                }
                if (hit || b.userData.life <= 0 || b.position.y < -2 || Math.abs(b.position.x) > 110 || Math.abs(b.position.z) > 110) {
                    scene.remove(b);
                    bullets.splice(i,1);
                }
            }
        }

        function updateEnemies() {
            for (let i=enemyUnits.length-1; i>=0; i--) {
                const unit = enemyUnits[i];
                if (!unit) continue;
                if (unit.userData.isAdvanced) {
                    unit.userData.dodgeTimer += 0.07;
                    const zigzag = Math.sin(unit.userData.dodgeTimer) * 0.18;
                    let direction = new THREE.Vector3().subVectors(player.position, unit.position).normalize();
                    direction.x += zigzag;
                    direction.z += Math.cos(unit.userData.dodgeTimer)*0.1;
                    direction.normalize();
                    unit.position.add(direction.multiplyScalar(unit.userData.speed));
                    for(let b of bullets) {
                        if(unit.position.distanceTo(b.position) < 5.5) {
                            let fleeDir = new THREE.Vector3().subVectors(unit.position, b.position).normalize();
                            unit.position.add(fleeDir.multiplyScalar(0.45));
                        }
                    }
                    unit.lookAt(player.position);
                } else {
                    const direction = new THREE.Vector3().subVectors(player.position, unit.position).normalize();
                    unit.position.add(direction.multiplyScalar(unit.userData.speed));
                    unit.lookAt(player.position);
                }
                if (unit.position.distanceTo(player.position) < 2.0) {
                    hitsTaken++;
                    document.getElementById('hits-count').innerText = hitsTaken;
                    document.getElementById('status-bar').style.display = 'block';
                    scene.remove(unit);
                    enemyUnits.splice(i,1);
                    updateEnemyCount();
                    if (hitsTaken >= maxHits) {
                        alert(\`شکست! \${playerName} پس از \${maxHits} برخورد نابود شد.\`);
                        location.reload();
                    }
                    continue;
                }
            }
        }

        function updateBoss() {
            if (!bossEnemy) return;
            if (bossEnemy.userData.isAdvanced) {
                for(let b of bullets) {
                    if(bossEnemy.position.distanceTo(b.position) < 7) {
                        let dirAway = new THREE.Vector3().subVectors(bossEnemy.position, b.position).normalize();
                        bossEnemy.position.add(dirAway.multiplyScalar(0.55));
                    }
                }
            }
            const direction = new THREE.Vector3().subVectors(player.position, bossEnemy.position).normalize();
            bossEnemy.position.add(direction.multiplyScalar(bossEnemy.userData.speed));
            bossEnemy.lookAt(player.position);
            if (bossEnemy.position.distanceTo(player.position) < 2.4) {
                hitsTaken++;
                document.getElementById('hits-count').innerText = hitsTaken;
                document.getElementById('status-bar').style.display = 'block';
                if (hitsTaken >= maxHits) {
                    alert("نبرد سخت بود... شما مغلوب شدید!");
                    location.reload();
                }
                const push = new THREE.Vector3().subVectors(bossEnemy.position, player.position).normalize().multiplyScalar(3);
                bossEnemy.position.add(push);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isGameActive && player) {
                updatePlayerMovement();
                updateEnemies();
                updateBoss();
                updateBullets();
                document.getElementById('p-hp').innerText = Math.max(0, 100 - hitsTaken*33);
            }
            renderer.render(scene, camera);
        }

        init();
    <\/script>
</body>
</html>`;

const DEFAULT_GAMES = [
{

<html>

<style>

  #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #888; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 10px; }
</style>
</head>
<body>
<div id="info">🎲 مکعب چرخان 3D</div>
<div id="controls">🖱 حرکت ماوس برای چرخش</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x1a1a2e);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
  const materials = [
    new THREE.MeshBasicMaterial({ color: 0xff6b6b }),
    new THREE.MeshBasicMaterial({ color: 0x4ecdc4 }),
    new THREE.MeshBasicMaterial({ color: 0xffe66d }),
    new THREE.MeshBasicMaterial({ color: 0xa8e6cf }),
    new THREE.MeshBasicMaterial({ color: 0xff8a5c }),
    new THREE.MeshBasicMaterial({ color: 0x6c5ce7 })
  ];
  const cube = new THREE.Mesh(geometry, materials);
  scene.add(cube);

  const edges = new THREE.EdgesGeometry(geometry);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x4ade80 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  cube.add(wireframe);

  const starsGeometry = new THREE.BufferGeometry();
  const starsCount = 1000;
  const starsPositions = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount * 3; i++) {
    starsPositions[i] = (Math.random() - 0.5) * 100;
  }
  starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
  const stars = new THREE.Points(starsGeometry, starsMaterial);
  scene.add(stars);

  camera.position.z = 4;

  let mouseX = 0, mouseY = 0;
  let targetX = 0, targetY = 0;

  document.addEventListener('mousemove', (event) => {
    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  document.addEventListener('touchmove', (event) => {
    if (event.touches.length > 0) {
      mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
      mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    targetX += (mouseX * 0.5 - targetX) * 0.05;
    targetY += (mouseY * 0.5 - targetY) * 0.05;
    cube.rotation.x += 0.005 + targetY * 0.01;
    cube.rotation.y += 0.01 + targetX * 0.01;
    stars.rotation.y += 0.0005;
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
<\/script>
</body>
</html>`

  renderer.setSize(window.innerWidth, window.innerHeight);

  const starsGeometry = new THREE.BufferGeometry();
  const starsCount = 2000;

    const theta = Math.random() * Math.PI * 2;

    starsColors[i * 3 + 1] = c;
    starsColors[i * 3 + 2] = c + Math.random() * 0.3;
  }

  starsGeometry.setAttribute('color', new THREE.BufferAttribute(starsColors, 3));

  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd93d });

    targetAngleY += (mouseY * 0.3 + 0.5 - targetAngleY) * 0.05;
    
    const angleX = targetAngleX;
    const angleY = Math.max(0.1, Math.min(1.5, targetAngleY));
    
    const x = cameraDistance * Math.sin(angleX) * Math.cos(angleY);
    const y = cameraDistance * Math.sin(angleY);
    const z = cameraDistance * Math.cos(angleX) * Math.cos(angleY);
    
    camera.position.x = x;
    camera.position.y = y;
    camera.position.z = z;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
<\/script>

  #combo { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); color: #ffd93d; font-size: 20px; z-index: 10; opacity: 0; transition: all 0.3s ease; }
</style>
</head>
<body>
<div id="score">🏆 0</div>
<div id="lives">❤️❤️❤️</div>
<div id="combo">🔥 COMBO!</div>
<div id="controls">⬅️ ➡️ یا A/D حرکت | ❤️ 3 جان | 💥 برخورد = -1 جان</div>
<div id="gameOver">
  <span class="emoji-big">💥</span>
  <h1>بازی تمام شد!</h1>
  <div class="final-score">امتیاز نهایی: <span id="finalScore">0</span></div>
  <button onclick="location.reload()">🔄 بازی دوباره</button>
</div>
<canvas id="game"></canvas>
<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const gameOverEl = document.getElementById('gameOver');
  const finalScoreEl = document.getElementById('finalScore');
  const comboEl = document.getElementById('combo');

  let W = window.innerWidth;
  let H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  const CAR_WIDTH = 40;
  const CAR_HEIGHT = 60;
  const LANE_WIDTH = Math.min(120, W * 0.15);
  const ROAD_LEFT = (W - LANE_WIDTH * 3) / 2;
  const ROAD_RIGHT = ROAD_LEFT + LANE_WIDTH * 3;

  let carX = W / 2;
  let score = 0;
  let lives = 3;
  let obstacles = [];
  let frameCount = 0;
  let gameRunning = true;
  let keys = {};
  let comboCount = 0;
  let comboTimeout = null;
  let difficulty = 1;

  function updateLives() {
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '❤️';
    if (lives === 0) hearts = '💀';
    livesEl.textContent = hearts;
  }

  function showCombo() {
    comboEl.style.opacity = '1';
    comboEl.textContent = '🔥 COMBO x' + comboCount + '!';
    clearTimeout(comboTimeout);
    comboTimeout = setTimeout(() => {
      comboEl.style.opacity = '0';
    }, 800);
  }

  function drawCar(x, y) {
    ctx.save();
    ctx.translate(x, y);
    
    ctx.shadowColor = 'rgba(255,107,107,0.3)';
    ctx.shadowBlur = 30;
    
    const grad = ctx.createLinearGradient(-CAR_WIDTH/2, -CAR_HEIGHT/2, CAR_WIDTH/2, CAR_HEIGHT/2);
    grad.addColorStop(0, '#ff6b6b');
    grad.addColorStop(1, '#ee5a24');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-CAR_WIDTH/2, -CAR_HEIGHT/2, CAR_WIDTH, CAR_HEIGHT, 8);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    
    ctx.fillStyle = 'rgba(78, 205, 196, 0.8)';
    ctx.beginPath();
    ctx.roundRect(-CAR_WIDTH/2 + 6, -CAR_HEIGHT/2 + 4, CAR_WIDTH - 12, CAR_HEIGHT * 0.3, 4);
    ctx.fill();
    
    ctx.fillStyle = '#ffd93d';
    ctx.shadowColor = '#ffd93d';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(-CAR_WIDTH/2 + 8, -CAR_HEIGHT/2 + 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(CAR_WIDTH/2 - 8, -CAR_HEIGHT/2 + 4, 5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(-CAR_WIDTH/2 + 6, -CAR_HEIGHT/2 + 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(CAR_WIDTH/2 - 6, -CAR_HEIGHT/2 + 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-CAR_WIDTH/2 + 6, CAR_HEIGHT/2 - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(CAR_WIDTH/2 - 6, CAR_HEIGHT/2 - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  }

  function drawObstacle(x, y, color, size) {
    ctx.save();
    ctx.translate(x, y);
    
    const s = size || 25;
    ctx.shadowColor = color + '66';
    ctx.shadowBlur = 20;
    
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s/2);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '88');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-s/2, -s/2, s, s, 5);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.restore();
  }

  function drawRoad() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);
    
    ctx.fillStyle = '#2a2a3e';
    ctx.fillRect(ROAD_LEFT, 0, ROAD_RIGHT - ROAD_LEFT, H);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 3;
    ctx.setLineDash([20, 30]);
    const centerX = (ROAD_LEFT + ROAD_RIGHT) / 2;
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, H);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ROAD_LEFT + 10, 0);
    ctx.lineTo(ROAD_LEFT + 10, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ROAD_RIGHT - 10, 0);
    ctx.lineTo(ROAD_RIGHT - 10, H);
    ctx.stroke();

    ctx.fillStyle = 'rgba(74,222,128,0.03)';
    ctx.fillRect(ROAD_LEFT, H/2 - 2, ROAD_RIGHT - ROAD_LEFT, 4);
  }

  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      if (r > w/2) r = w/2;
      if (r > h/2) r = h/2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };
  }

  function spawnObstacle() {
    const colors = ['#ff6b6b', '#ffd93d', '#4ecdc4', '#ff8a5c', '#a8e6cf', '#6c5ce7'];
    const lane = Math.floor(Math.random() * 3);
    const x = ROAD_LEFT + LANE_WIDTH * (lane + 0.5);
    const size = 20 + Math.random() * 20;
    obstacles.push({
      x: x,
      y: -size/2,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: size,
      lane: lane,
      speed: 3 + Math.random() * 2 + (score / 200)
    });
  }

  function gameOver() {
    gameRunning = false;
    finalScoreEl.textContent = score;
    gameOverEl.style.display = 'block';
  }

  function update() {
    if (!gameRunning) return;
    
    frameCount++;
    
    difficulty = 1 + Math.floor(score / 50);
    const spawnRate = Math.max(15, 60 - difficulty * 3);
    
    const moveSpeed = 6 + (score / 100);
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      carX = Math.max(ROAD_LEFT + CAR_WIDTH/2 + 10, carX - moveSpeed);
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      carX = Math.min(ROAD_RIGHT - CAR_WIDTH/2 - 10, carX + moveSpeed);
    }
    
    if (frameCount % spawnRate === 0) {
      spawnObstacle();
      if (Math.random() < 0.2 && score > 30) {
        spawnObstacle();
      }
    }
    
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += o.speed;
      
      const carY = H / 2;
      const dx = Math.abs(o.x - carX);
      const dy = Math.abs(o.y - carY);
      const hitDist = (o.size + CAR_WIDTH) / 2 - 5;
      
      if (dx < hitDist && dy < (o.size + CAR_HEIGHT) / 2 - 5) {
        lives--;
        updateLives();
        ctx.fillStyle = 'rgba(255,0,0,0.3)';
        ctx.fillRect(0, 0, W, H);
        
        if (lives <= 0) {
          gameOver();
          return;
        }
        
        obstacles.splice(i, 1);
        comboCount = 0;
        continue;
      }
      
      if (o.y > H + 50) {
        const bonus = 10 + Math.floor(comboCount / 3) * 5;
        score += bonus;
        comboCount++;
        if (comboCount >= 3) {
          showCombo();
        }
        scoreEl.textContent = '🏆 ' + score;
        obstacles.splice(i, 1);
      }
    }
  }

  function draw() {
    drawRoad();
    
    obstacles.forEach(o => {
      drawObstacle(o.x, o.y, o.color, o.size);
    });
    
    drawCar(carX, H/2);
    
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, 0, W, 2);
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', e => {
    keys[e.key] = false;
  });

  let touchX = null;
  canvas.addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    e.preventDefault();
  });
  canvas.addEventListener('touchmove', e => {
    if (touchX !== null) {
      const rect = canvas.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      carX = Math.max(ROAD_LEFT + CAR_WIDTH/2 + 10, Math.min(ROAD_RIGHT - CAR_WIDTH/2 - 10, x));
    }
    e.preventDefault();
  });
  canvas.addEventListener('touchend', () => {
    touchX = null;
  });

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  });

  updateLives();
  gameLoop();
})();
<\/script>
</body>
</html>`
},

class SecurolpicxewsApp{
constructor(){
this.currentUser=null;
this.uploadedGames=[];
this.publicGames=[];
this.uploadType='html';
this.currentGame=null;
this.loadedScripts=new Set();
this.storageAvailable = this.checkStorageAvailability();
this.init();
}

checkStorageAvailability() {
try {
localStorage.setItem('test', 'test');
localStorage.removeItem('test');
return true;
} catch(e) {
try {
sessionStorage.setItem('test', 'test');
sessionStorage.removeItem('test');
return true;
} catch(e2) {
return false;
}
}
}

getStorage() {
if (this.storageAvailable) {
try {
return localStorage;
} catch(e) {
return sessionStorage;
}
}
return {
getItem: () => null,
setItem: () => {},
removeItem: () => {}
};
}

init(){
this.loadFromStorage();
this.renderAll();
this.setupDragDrop();
}

loadFromStorage(){
const storage = this.getStorage();
try {
const users = JSON.parse(storage.getItem('sec_users') || '{}');
const current = storage.getItem('sec_currentUser');
this.uploadedGames = JSON.parse(storage.getItem('sec_uploadedGames') || '[]');
this.publicGames = JSON.parse(storage.getItem('sec_publicGames') || '[]');
if(current) {
this.currentUser = JSON.parse(current);
this.updateAuthUI();
}
} catch(e) {
console.warn('Storage read error, using defaults');
this.uploadedGames = [];
this.publicGames = [];
}
}

saveToStorage(){
const storage = this.getStorage();
try {
storage.setItem('sec_uploadedGames', JSON.stringify(this.uploadedGames));
storage.setItem('sec_publicGames', JSON.stringify(this.publicGames));
if(this.currentUser) {
storage.setItem('sec_currentUser', JSON.stringify(this.currentUser));
}
} catch(e) {
console.warn('Storage write error');
this.showNotification('⚠️ خطا در ذخیره‌سازی داده‌ها', 'error');
}
}

hashPassword(p){
let h=0;
for(let i=0;i<p.length;i++)h=((h<<5)-h)+p.charCodeAt(i),h=h&h;
return h.toString(16);
}

register(){
const username=document.getElementById('regUsername').value.trim();
const email=document.getElementById('regEmail').value.trim();
const password=document.getElementById('regPassword').value;
const confirm=document.getElementById('regPasswordConfirm').value;
if(!username||!email||!password){this.showNotification('❌ همه فیلدها را پر کنید','error');return;}
if(password!==confirm){this.showNotification('❌ رمز عبور یکسان نیست','error');return;}
const storage = this.getStorage();
const users=JSON.parse(storage.getItem('sec_users')||'{}');
if(users[username]){this.showNotification('❌ نام کاربری قبلاً ثبت شده','error');return;}
users[username]={username,email,passwordHash:this.hashPassword(password),isRegistered:true};
storage.setItem('sec_users',JSON.stringify(users));
this.currentUser=users[username];this.saveToStorage();this.updateAuthUI();
this.showNotification('✅ ثبت نام موفق!','success');
}

login(){
const username=document.getElementById('loginUsername').value.trim();
const password=document.getElementById('loginPassword').value;
if(!username||!password){this.showNotification('❌ همه فیلدها را پر کنید','error');return;}
const storage = this.getStorage();
const users=JSON.parse(storage.getItem('sec_users')||'{}');
const user=users[username];
if(!user||user.passwordHash!==this.hashPassword(password)){this.showNotification('❌ نام کاربری یا رمز عبور اشتباه','error');return;}
this.currentUser=user;this.saveToStorage();this.updateAuthUI();
this.showNotification('✅ خوش آمدید '+username+'!','success');
}

guestLogin(){
this.currentUser={username:'مهمان_'+Math.floor(Math.random()*10000),isGuest:true,isRegistered:false};
this.saveToStorage();this.updateAuthUI();
this.showNotification('✅ ورود به عنوان مهمان','info');
}

logout(){
this.currentUser=null;
const storage = this.getStorage();
storage.removeItem('sec_currentUser');
this.updateAuthUI();this.showNotification('👋 خداحافظ!','info');
}

switchAuthTab(tab,el){
document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
el.classList.add('active');document.getElementById(tab+'Form').classList.add('active');
}

updateAuthUI(){
const authPanel=document.getElementById('authPanel');
const userPanel=document.getElementById('userPanel');
const uploadPanel=document.getElementById('uploadPanel');
const lockedPanel=document.getElementById('lockedPanel');
if(this.currentUser){
authPanel.style.display='none';userPanel.style.display='block';
document.getElementById('userDisplayName').textContent='👤 '+this.currentUser.username;
const badge=document.getElementById('userBadge');
if(this.currentUser.isRegistered){badge.textContent='عضو';badge.className='badge';uploadPanel.style.display='block';lockedPanel.style.display='none';}
else{badge.textContent='مهمان';badge.className='badge guest';uploadPanel.style.display='none';lockedPanel.style.display='block';}
}else{
authPanel.style.display='block';userPanel.style.display='none';
uploadPanel.style.display='none';lockedPanel.style.display='none';
}
this.renderAll();
}

handleFiles(files){
if(!this.currentUser||!this.currentUser.isRegistered){this.showNotification('❌ فقط اعضا می‌توانند آپلود کنند','error');return;}
const isPublic=document.getElementById('publicUpload').checked;
Array.from(files).forEach(file=>{
const ext=file.name.split('.').pop().toLowerCase();
if(this.uploadType==='html'&&ext==='html')this.uploadHTML(file,isPublic);
else if(this.uploadType==='zip'&&ext==='zip')this.uploadZIP(file,isPublic);
else this.showNotification('❌ فرمت نامعتبر: '+file.name,'error');
});
}

uploadHTML(file,isPublic){
const reader=new FileReader();
reader.onload=(e)=>{
const game={id:'g_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),name:file.name.replace('.html',''),type:'html',content:e.target.result,size:file.size,date:new Date().toLocaleDateString('fa-IR'),owner:this.currentUser.username,isPublic};
this.saveGame(game,isPublic);this.showNotification('✅ '+file.name+' آپلود شد!','success');
};
reader.readAsText(file);
}

uploadZIP(file,isPublic){
this.loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js').then(()=>{
const reader=new FileReader();
reader.onload=(e)=>{
const zip=new JSZip();
zip.loadAsync(e.target.result).then((contents)=>{
const files={};const promises=[];
contents.forEach((rp,ze)=>{if(!ze.dir)promises.push(ze.async('text').then(c=>{files[rp]=c;}));});
Promise.all(promises).then(()=>{
const game={id:'g_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),name:file.name.replace('.zip',''),type:'zip',files,size:file.size,date:new Date().toLocaleDateString('fa-IR'),owner:this.currentUser.username,isPublic};
this.saveGame(game,isPublic);this.showNotification('✅ '+file.name+' آپلود شد!','success');
});
});
};
reader.readAsArrayBuffer(file);
});
}

loadScript(src){
return new Promise((resolve,reject)=>{
if(typeof JSZip!=='undefined'){resolve();return;}
const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=()=>{
this.showNotification('⚠️ خطا در بارگذاری کتابخانه','error');
resolve();
};
document.head.appendChild(s);
});
}

saveGame(game,isPublic){
this.uploadedGames.push(game);this.saveToStorage();
if(isPublic){const pd={...game};delete pd.content;delete pd.files;this.publicGames.push(pd);this.saveToStorage();}
this.renderAll();
}

deleteGame(id){
if(!confirm('آیا مطمئن هستید؟'))return;
this.uploadedGames=this.uploadedGames.filter(g=>g.id!==id);
this.publicGames=this.publicGames.filter(g=>g.id!==id);
this.saveToStorage();this.renderAll();this.showNotification('🗑 بازی پاک شد','info');
}

setupDragDrop(){
const dz=document.querySelector('.drop-zone');
if(!dz)return;
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#4ade80';dz.style.background='rgba(74,222,128,0.05)';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';dz.style.background='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';dz.style.background='';this.handleFiles(e.dataTransfer.files);});
}

renderAll(){this.renderDefaultGames();this.renderMyGames();this.renderPublicGames();}

renderDefaultGames(){
const container = document.getElementById('defaultGames');
if(!container)return;
container.innerHTML=DEFAULT_GAMES.map(g=>this.createGameCard(g,'default')).join('');
}

renderMyGames(){
const c=document.getElementById('myGames');
if(!c)return;
if(!this.currentUser){c.innerHTML='<p style="color:#888;padding:20px;">لطفاً وارد شوید</p>';return;}
const my=this.uploadedGames.filter(g=>g.owner===this.currentUser.username);
if(!my.length){c.innerHTML='<p style="color:#888;padding:20px;">هنوز بازی‌ای آپلود نکرده‌اید</p>';return;}
c.innerHTML=my.map(g=>this.createGameCard(g,'my')).join('');
}

renderPublicGames(){
const c=document.getElementById('publicGames');
if(!c)return;
const pub=this.publicGames.filter(g=>!g.isDefault);
if(!pub.length){c.innerHTML='<p style="color:#888;padding:20px;">هنوز بازی عمومی توسط کاربران آپلود نشده</p>';return;}
c.innerHTML=pub.map(g=>this.createGameCard(g,'public')).join('');
}

createGameCard(game,section){
const isDefault=game.isDefault;
const isMy=section==='my';
const tag=isDefault?'<span class="tag default">پیش‌فرض</span>':game.isPublic?'<span class="tag public">🌐 عمومی</span>':'<span class="tag private">🔒 خصوصی</span>';
const author=game.author||game.owner||'ناشناس';
const size=game.size<1024?game.size+' B':game.size<1048576?(game.size/1024).toFixed(1)+' KB':(game.size/1048576).toFixed(1)+' MB';
const deleteBtn=isMy?`<button class="card-btn delete" onclick="app.deleteGame('${game.id}')">🗑</button>`:'';
return `<div class="game-card"><div class="game-card-header"><div class="game-icon">${isDefault?'🎮':'📦'}</div><div><div class="game-card-title">${game.name}</div><div class="game-card-meta">${author} • ${size}</div></div></div><div class="game-card-tags">${tag}</div><div class="game-card-actions"><button class="card-btn play" onclick="app.playGame('${game.id}')">▶ اجرا</button>${deleteBtn}</div></div>`;
}

playGame(id){
const game=DEFAULT_GAMES.find(g=>g.id===id)||this.uploadedGames.find(g=>g.id===id)||this.publicGames.find(g=>g.id===id);
if(!game){this.showNotification('❌ بازی یافت نشد','error');return;}
this.currentGame=game;
document.getElementById('overlayTitle').textContent=game.name;
document.getElementById('gameOverlay').classList.add('active');
document.getElementById('gameLoading').classList.remove('hidden');
document.getElementById('overlayStatus').textContent='Loading...';
document.getElementById('overlayStatus').style.color='#fbbf24';
const area=document.getElementById('gameCanvasArea');

area.innerHTML = '';
const loadingDiv = document.createElement('div');
loadingDiv.className = 'loading-screen';
loadingDiv.id = 'gameLoading';
loadingDiv.innerHTML = `<div class="spinner"></div><div style="color:#888;font-size:14px">در حال بارگذاری بازی...</div>`;
area.appendChild(loadingDiv);

try {
if(game.type==='html') {
this.runHTMLGame(game.content, area);
} else if(game.type==='zip') {
this.runZIPGame(game.files, area);
}
} catch(e) {
console.error('Game load error:', e);
this.showNotification('⚠️ خطا در اجرای بازی', 'error');
document.getElementById('gameLoading').classList.add('hidden');
document.getElementById('overlayStatus').textContent='Error';
document.getElementById('overlayStatus').style.color='#f87171';
return;
}

setTimeout(()=>{
const loading = document.getElementById('gameLoading');
if(loading) loading.classList.add('hidden');
document.getElementById('overlayStatus').textContent='Running';
document.getElementById('overlayStatus').style.color='#4ade80';
}, 1500);
}

runHTMLGame(content, area){
try {
const iframe = document.createElement('iframe');
iframe.style.width = '100%';
iframe.style.height = '100%';
iframe.style.border = 'none';
iframe.style.background = '#0a0a1a';
iframe.sandbox = 'allow-scripts allow-same-origin allow-modals allow-popups allow-forms';
iframe.allow = 'fullscreen';

let finalContent = content;
if (!finalContent.includes('<!DOCTYPE html>')) {
finalContent = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #0a0a1a; }
</style>
</head>
<body>
${finalContent}
</body>
</html>`;
}

iframe.srcdoc = finalContent;
area.innerHTML = '';
area.appendChild(iframe);

iframe.addEventListener('load', () => {
try {
const doc = iframe.contentDocument || iframe.contentWindow?.document;
if (doc) {
console.log('Game loaded successfully');
}
} catch(e) {
console.warn('Could not access iframe content:', e);
}
});

} catch(e) {
console.error('HTML game execution error:', e);
this.showNotification('⚠️ خطا در اجرای بازی HTML', 'error');
throw e;
}
}

runZIPGame(files, area){
try {
let mainHtml=null;
for(const p in files){
if(p.endsWith('.html')||p.endsWith('.htm')){
mainHtml=files[p];
break;
}
}
if(!mainHtml){
this.showNotification('❌ فایل HTML در ZIP پیدا نشد','error');
return;
}
this.runHTMLGame(mainHtml, area);
} catch(e) {
console.error('ZIP game execution error:', e);
this.showNotification('⚠️ خطا در اجرای بازی ZIP', 'error');
throw e;
}
}

closeGame(){
document.getElementById('gameOverlay').classList.remove('active');
const area = document.getElementById('gameCanvasArea');
if(area) {
area.innerHTML = `<div class="loading-screen" id="gameLoading"><div class="spinner"></div><div style="color:#888;font-size:14px">در حال بارگذاری بازی...</div></div>`;
}
this.currentGame=null;
}

refreshGame(){if(this.currentGame)this.playGame(this.currentGame.id);}

toggleFullscreen(){
try {
if(!document.fullscreenElement && !document.webkitFullscreenElement) {
const el = document.documentElement;
if(el.requestFullscreen) {
el.requestFullscreen();
} else if(el.webkitRequestFullscreen) {
el.webkitRequestFullscreen();
}
} else {
if(document.exitFullscreen) {
document.exitFullscreen();
} else if(document.webkitExitFullscreen) {
document.webkitExitFullscreen();
}
}
} catch(e) {
console.warn('Fullscreen error:', e);
}
}

showNotification(msg,type){
const colors={success:'#4ade80',error:'#f87171',info:'#60a5fa'};
const n=document.createElement('div');
n.className='notification';
n.textContent=msg;
n.style.background=colors[type] || colors.info;
n.style.color='#1a1a2e';
document.body.appendChild(n);
setTimeout(()=>{
n.style.opacity='0';
n.style.transition='opacity 0.3s';
setTimeout(()=>n.remove(),300);
},3000);
}
}

document.addEventListener('DOMContentLoaded', function() {
window.app = new SecurolpicxewsApp();
});
</script>
</body>
</html>
